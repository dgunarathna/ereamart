<!DOCTYPE html>
<html lang="en">
<div th:replace="~{common :: headFragment}"></div>
<div th:replace="~{common :: bgimage}"></div>

<head>
    <script src="chart/chart.min.js"></script>
</head>

<body>


    <!-- Cursor effect -->
    <div class="cursor"></div>

    <!-- nav bar -->
    <div class="container-fluid p-0 m-0">
        <nav class="navbar row py-0 mx-0 gap-1">
            <div class="col-xl d-flex p-0 gap-1">
                <a href="/dashboard.html"><img src="/images/logo/logomark-md.svg" alt=""></a>
                <h5 class="my-auto" th:text="'Hi '+ ${loggedusername} + '👋'"></h5>
            </div>
            <div class="col-xl-6  d-flex p-0">
                <ul class="nav nav-pills justify-content-center rounded-pill p-1 mx-auto" style="width: fit-content;">
                    <li class="nav-item"><a class="nav-link rounded-pill active" aria-current="page"
                            href="/dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/privilege.html">Privilege</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/employee.html">Employee</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/user.html">User</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/product.html">Product</a></li>
                </ul>
            </div>

            <div class="col-xl d-flex gap-1 justify-content-end my-auto p-0">

                


                <button type="button" class="btn btn-icon rounded-pill bg-light" data-bs-toggle="dropdown"
                    aria-expanded="false"> <img id="imgLogUserPhoto" src="/images/default.png" alt=""
                        class="rounded-pill" width="40px "></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/home.html">Buyer mode</a></li>
                    <li><a class="dropdown-item" href="/profile.html">Profile</a></li>
                    <li><a class="dropdown-item" href="/logout">Log out</a></li>
                </ul>

            </div>

        </nav>
    </div>

    <div class="row app p-0 m-0">
        <!-- Sidebbar -->
        <div class="col-1 p-0 m-0 w-auto h-100 d-flex">
            <ul class="nav nav-pills verticle_navbar my-auto list-group sidebarbody p-1" style="width: fit-content;">
                <li class="nav-item"><a class="nav-link btn-icon active" href="/dashboard.html"><i
                            class="fa-solid fa-house"></i></a></li>
                <li class="nav-item"><a class="nav-link btn-icon" href="/quotation.html"><i
                            class="fa-solid fa-store"></i></a></li>
                <li class="nav-item"><a class="nav-link btn-icon" href="/expense.html"><i
                            class="fa-solid fa-wallet"></i></a></li>
                <li class="nav-item"><a class="nav-link btn-icon" href="/supplier.html"><i
                            class="fa-solid fa-users"></i></a></li>
            </ul>
        </div>

        <!-- center area -->
        <div class="col p-1 align-self-start appCenter">


            <!-- 1st row metrics -->
            <div class="row g-1 mb-1 ">
                <div class="col-xl-3 col-lg-6 col-md-6 ">
                    <div class="card h-100">
                        <div class="card-body ">
                            <p class="card-title">Profit</p>
                            <h4>$1000000.00</h4>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-lg-6 col-md-6">
                    <div class="card h-100">
                        <div class="card-body">
                            <p class="card-title">Loss</p>
                            <h4>$52.00</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2nd row chart-->
            <div class="row g-1 mb-1">
                <div class="col-xl-3 col-lg-6 col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <p class="card-title">Orders</p>
                                <!-- <button type="button" class="btn btn-icon btn-outline-primary rounded-circle" id="buttonPrint" onclick="printChart('Orders','orderReport')"><i class="fa-solid fa-print"></i></button> -->
                            </div>
                            <div><canvas id="orderReport"></canvas></div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-lg-6 col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <p class="card-title">Sales</p>
                                <!-- <button type="button" class="btn btn-icon btn-outline-primary rounded-circle" id="buttonPrint"><i class="fa-solid fa-print"></i></button> -->
                            </div>
                            <div><canvas id="salesReport"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3rd row table -->
            <div class="row g-1 my-2">
                <div class="col-xl-12 col-lg-12 col-md-12 d-flex align-items-center justify-content-between">
                    <div><h6 class="card-title d-flex">Reports</h6></div>
                <div class="d-flex gap-1">
                    <input type="date" class="form-control w-auto" id="dateStart"onchange="genearatePayementReport()">
                    <input type="date" class="form-control w-auto" id="dateEnd"onchange="genearatePayementReport()">
                    <select name="" id="selectType" class="form-select w-auto"onchange="genearatePayementReport()">
                        <option value="Monthly">Monthly</option>
                        <option value="Weekly">Weekly</option>
                        <option value="Daily">Daily</option>
                    </select>
                </div>
                </div>
            </div>

            <!-- 3rd row table -->
            <div class="row g-1 mb-1">
                <div class="col-xl-6 col-lg-12 col-md-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center pt-3">
                            <p class="card-title d-flex align-items-center">Order Report</p>
                            <button type="button"
                                onclick="printChart('Order Report','paymentReport', 'tablePayement')"
                                class="btn btn-icon btn-outline-primary  rounded-circle" id="buttonPrint"><i
                                    class="fa-solid fa-print"></i></button>

                        </div>
                        <div class="card-body d-flex" id="bodyPayementReport">
                            <div class="col">

                                <div><canvas id="paymentReport"></canvas></div>
                            </div>
                            <div class="col">
                                <div class="table-responsive">
                                    <table class="table  table-hover" id="tablePayement">
                                        <thead>
                                            <tr>
                                                <th scope="col">Period</th>
                                                <th scope="col">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBodyPayement"></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                <div class="col-xl-6 col-lg-12 col-md-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center pt-3">
                            <p class="card-title d-flex align-items-center">Invoice Report</p>
                            <button type="button"
                                onclick="printChart('Invoice Report','paymentRepoprt', 'tablePayement')"
                                class="btn btn-icon btn-outline-primary  rounded-circle" id="buttonPrint"><i
                                    class="fa-solid fa-print"></i></button>

                        </div>
                        <div class="card-body d-flex" id="bodyPayementReport">
                            <div class="col">

                                <div><canvas id="paymentRepport"></canvas></div>
                            </div>
                            <div class="col">
                                <div class="table-responsive">
                                    <table class="table  table-hover" id="tablePapyement">
                                        <thead>
                                            <tr>
                                                <th scope="col">Period</th>
                                                <th scope="col">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBodypPayement"></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                <div class="col-xl-6 col-lg-12 col-md-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center pt-3">
                            <p class="card-title d-flex align-items-center">Income Report</p>
                            <button type="button"
                                onclick="printChart('Income Report','paymentRepoprt', 'tablePayement')"
                                class="btn btn-icon btn-outline-primary  rounded-circle" id="buttonPrint"><i
                                    class="fa-solid fa-print"></i></button>

                        </div>
                        <div class="card-body d-flex" id="bodyPayementReport">
                            <div class="col">

                                <div><canvas id="paymentRepport"></canvas></div>
                            </div>
                            <div class="col">
                                <div class="table-responsive">
                                    <table class="table  table-hover" id="tablePapyement">
                                        <thead>
                                            <tr>
                                                <th scope="col">Period</th>
                                                <th scope="col">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBodypPayement"></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
                <div class="col-xl-6 col-lg-12 col-md-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center pt-3">
                            <p class="card-title d-flex align-items-center">Expenses Report</p>
                            <button type="button"
                                onclick="printChart('Payement Report','paymentRepoprt', 'tablePayement')"
                                class="btn btn-icon btn-outline-primary  rounded-circle" id="buttonPrint"><i
                                    class="fa-solid fa-print"></i></button>

                        </div>
                        <div class="card-body d-flex" id="bodyPayementReport">
                            <div class="col">

                                <div><canvas id="paymentRepport"></canvas></div>
                            </div>
                            <div class="col">
                                <div class="table-responsive">
                                    <table class="table  table-hover" id="tablePapyement">
                                        <thead>
                                            <tr>
                                                <th scope="col">Period</th>
                                                <th scope="col">Amount</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBodypPayement"></tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>


        </div>
    </div>




    <!-- Bottombar -->
    <ul class="list-group nav nav-pills list-group-horizontal justify-content-center sidebarbody p-1 mx-auto horizontal_navbar"
        style="width: fit-content;">

        <li class="nav-item"><a class="nav-link btn-icon active" href="/dashboard.html"><i
                    class="fa-solid fa-house"></i></a></li>
        <li class="nav-item"><a class="nav-link btn-icon" href="/quotation.html"><i class="fa-solid fa-store"></i></a>
        </li>
        <li class="nav-item"><a class="nav-link btn-icon" href="/expense.html"><i class="fa-solid fa-wallet"></i></a>
        </li>
        <li class="nav-item"><a class="nav-link btn-icon" href="/supplier.html"><i class="fa-solid fa-users"></i></a>
        </li>

    </ul>
    </div>

    <div th:replace="~{common :: scripts}"></div>
    <script src="/uicontroller/dashboard.js"></script>
</body>

</html>
