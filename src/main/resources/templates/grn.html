<!DOCTYPE html>
<html lang="en">
<div th:replace="~{common :: headFragment}"></div>
<body>

  
  <!-- Cursor effect -->
  <div class="cursor"></div>

  <div class="container-fluid p-0 m-0">
      <!-- nav bar -->
      <nav class="navbar row py-0 mx-0">
          <div class="col-xl d-flex p-0 gap-1">
              <a href="/dashboard"><img src="/images/logo/logomark-md.svg" alt=""></a>
              <h4 class="my-auto" id="wordmark"><span style=" color: #059025;">Erea</span><Span style=" color: #97CC16;">Mart</Span></h4>
          </div>
          <div class="col-xl-6 d-flex p-0">
            <ul class="list-group nav nav-pills list-group-horizontal rounded-pill justify-content-center sidebarbody p-1 mx-auto horizontal_navbar" style="width: fit-content;">
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/dashboard">Home</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill active" href="/product">Store</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/expense">Wallet</i></a></li>
                </ul>
          </div>
            <div th:replace="~{common :: sellerprofiledropdown}"></div>
          
      </nav>

      <div class=" container-fluid row p-0 m-0">
        <div class="col"></div>
        <div class="col-xl-6 mt-1">
          <ul class="nav nav-pills rounded-pill justify-content-center p-1 mx-auto" style="width: fit-content;">
            <li class="nav-item"><a class="nav-link rounded-pill" href="/product">Product</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/supplier">Supplier</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/quotation">Quotation</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/respond">Respond</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/orders">Order</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill active" href="/grn">GRN</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/inventory">Inventory</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/customer">Customer</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill" href="/invoice">Invoice</a></li>
          </ul>
        </div>
        <div class="col-xl d-flex gap-1 text-end my-auto p-0">
              <input class="form-control rounded-pill" type="search" placeholder="Search" aria-label="Search">
              <button type="button" class="btn btn-icon btn-primary rounded-circle" onclick="buttonAddNew()" data-bs-toggle="modal" data-bs-target="#modalGRNForm"><i class="fa-solid fa-plus"></i></button>
            </div>
    </div>

      <div class="row app p-0 m-0">
          <div class="col">
          <!-- Table -->
          <div class="table-responsive">
            <table class="table table-hover align-middle" id="tableGRN">
              <thead>
                <tr>
                  <th>GRN No</th>
                  <th>Order No</th>
                  <th>Invoice No</th>
                  <th>Received Date</th>
                  <th>Total Amount</th>
                  <th>Discount Rate</th>
                  <th>Net Amount</th>
                  <th>Status</th>
              </tr>
              </thead>
              <tbody id="tableGRNBody"></tbody>
            </table>
          </div>
          </div>
      </div>
      <!-- Modal -->
    <div class="modal fade" id="modalGRNForm" tabindex="-1" aria-labelledby="modalGRNFormLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content">
      
          <div class="modal-header">
            <h6 class="modal-title" id="modalGRNFormLabel">Add New</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
      
          <div class="modal-body">
            <form id="formGRN" class="row g-3 col-xl-12 col-lg-12 col-md-12 mx-auto" onsubmit="return false">
              <div class="col-lg-6">
                <label class="form-label">Order no</label>
                <select id="selectOrder"  class="form-select" onchange="selectDynamicElementValidator(this,'grn','orders_id'); filterProductByOrder();"></select>
              </div>
              <div class="col-lg-6">
                <label class="form-label">Supplier Invoice Number<span class="text-danger">*</span></label>
                <input id="textInvoiceNo" type="text" Required  class="form-control" onkeyup="textValidator(this,'^([A-Za-z0-9\\s\\,]{1,20}.?)+$','grn','supplier_invoice_number')">
              </div>

              <div class="col-xl-3">
                <label class="form-label">Product<span class="text-danger">*</span></label>
                <select id="selectItem" Required class="form-select" onchange="selectDynamicElementValidator(this,'grnHasProduct','product_id'); checkProductExt();"></select>
              </div>
              <div class="col-xl-2">
                <label class="form-label">Quantity<span class="text-danger">*</span></label>
                <input id="textQTY" type="text" Required  class="form-control" onkeyup="textValidator(this,'^[0-9]+$', 'grnHasProduct','quantity'); calculateLinePrice();">
              </div>
              <div class="col-xl-2">
                <label class="form-label">Unit Price<span class="text-danger">*</span></label>
                <input id="textUnitPrice" type="text" Required  class="form-control" onkeyup="textValidator(this,'^[0-9]+(\\.[0-9]{1,2})?$', 'grnHasProduct','unitprice')">
              </div>
              <div class="col-xl-2">
                <label class="form-label">Line price<span class="text-danger">*</span></label>
                <input id="textLinePrice" type="text" Required  class="form-control" onkeyup="textValidator(this,'^[0-9]+(\\.[0-9]{1,2})?$', 'grnHasProduct','lineprice')">
              </div>
              <div class="col-xl-2">
                <label class="form-label">Batch No<span class="text-danger">*</span></label>
                <input id="textBatchNo" type="text" Required  class="form-control" onkeyup="textValidator(this,'^[A-Za-z0-9\\-]{1,50}$', 'grnHasProduct','batch_number')">
              </div>

              <div class="col-xl-1 gap-1 d-flex align-items-end">
                <button type="button" onclick="buttonInvoiceItemSubmit()" class="btn btn-outline-primary w-100" id="buttonItemSubmit"><i class="fa-solid fa-plus"></i></button>
                <button type="button" onclick="buttonInvoiceItemUpdate()" class="btn btn-warning w-100" id="buttonItemUpdate"><i class="fa-solid fa-check"></i></button>
              </div>

              <div class="col-lg-12">
                <div class="table-responsive">
                  <table class="table table-hover align-middle" id="tableGRNItem">
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Line Price</th>
                        <th>Batch No</th>
                        <th>Modify</th>
                      </tr>
                    </thead>
                    <tbody id="tableGRNItemBody"></tbody>
                  </table>
                </div>
              </div>


              <div class="col-lg-4">
                <label class="form-label">Total Amount<span class="text-danger">*</span></label>
                <input id="textTotalAmount" type="text" Required class="form-control" onkeyup="textValidator(this,'^([A-Za-z0-9\\s\\,]{1,20}.?)+$','grn','total_amount')">
              </div>
              <div class="col-lg-4">
                <label class="form-label">Total Discount<span class="text-danger">*</span></label>
                <input id="textDiscountRate" type="text" Required class="form-control" onkeyup="textValidator(this,'^([A-Za-z0-9\\s\\,]{1,20}.?)+$','grn','discount')">
              </div>
              <div class="col-lg-4">
                <label class="form-label">Net Amount<span class="text-danger">*</span></label>
                <input id="textNetAmount" type="text" Required class="form-control" onkeyup="textValidator(this,'^([A-Za-z0-9\\s\\,]{1,20}.?)+$','grn','net_amount')">
              </div>  
              <div class="col-lg-6">
                <label class="form-label">Received Date<span class="text-danger">*</span></label>
                <input id="textReceivedDate" type="date" Required  class="form-control" onkeydown="return false" onchange="dateElemantValidator(this, 'grn','recieved_date')">
              </div>
              <div class="col-lg-6">
                <label for="selectStatus" class="form-label">Status<span class="text-danger">*</span></label>
                <select id="selectStatus" Required class="form-select" onchange="selectDynamicElementValidator(this,'grn','grn_status_id')"></select>
              </div>


            </form>
          </div>
      
          <div class="modal-footer">
            <div class="col">
              <button type="button" onclick="buttonGRNDelete(window['editOb'], window['editRowIndex'])" class="btn btn-outline-danger" id="buttonDelete">Delete</button>
              <button type="button" onclick="refreshGRNForm()" class="btn btn-outline-danger" id="buttonClear">Clear</button>
            </div> 
            <div class="col text-end">
              <button type="button" onclick="buttonGRNPrint(window['editOb'], window['editRowIndex'])" class="btn btn-tertiry" id="buttonPrint">Print</button>    
              <button type="button" onclick="buttonGRNUpdate()" class="btn btn-primary" id="buttonUpdate">Update</button>    
              <button type="button" onclick="buttonGRNSubmit()" class="btn btn-primary" id="buttonSubmit">Submit</button>  
          </div>
          </div>
      
        </div>
      </div>
      </div>
  </div>

      <div th:replace="~{common :: scripts}"></div>
      <script src="/uicontroller/grn.js"></script>
</body>
</html>
