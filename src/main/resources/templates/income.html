<!DOCTYPE html>
<html lang="en">
<div th:replace="~{common :: headFragment}"></div>
<body>
  
  <!-- Cursor effect -->
  <div class="cursor"></div>

  <div class="container-fluid p-0 m-0">
      <!-- nav bar -->
      <nav class="navbar row py-0 mx-0">
          <div class="col-xl d-flex p-0 gap-1">
              <a href="/dashboard"><img src="/images/logo/logomark-md.svg" alt=""></a>
              <h4 class="my-auto" id="wordmark"><span style=" color: #059025;">Erea</span><Span style=" color: #97CC16;">Mart</Span></h4>
          </div>
          <div class="col-xl-6 d-flex p-0">
            <ul class="list-group nav nav-pills list-group-horizontal rounded-pill justify-content-center sidebarbody p-1 mx-auto horizontal_navbar" style="width: fit-content;">
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/dashboard">Home</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill" href="/product">Store</a></li>
                    <li class="nav-item"><a class="nav-link rounded-pill active" href="/expense">Wallet</i></a></li>
                </ul>
          </div>
          <div th:replace="~{common :: sellerprofiledropdown}"></div>
          
      </nav>

      <div class=" container-fluid row p-0 m-0">
        <div class="col"></div>
        <div class="col-xl-6 mt-1 p-0">
          <ul class="nav nav-pills rounded-pill justify-content-center p-1 mx-auto" style="width: fit-content;">
            <li class="nav-item"><a class="nav-link rounded-pill" aria-current="page" href="/expense">Expenses</a></li>
            <li class="nav-item"><a class="nav-link rounded-pill active" href="/income">Income</a></li>
          </ul>
        </div>
        <div class="col-xl d-flex gap-1 text-end my-auto p-0">
              <input class="form-control rounded-pill" type="search" placeholder="Search" aria-label="Search">
              <button type="button" class="btn btn-icon btn-primary rounded-circle" onclick="buttonAddNew()" data-bs-toggle="modal" data-bs-target="#modalIncomeForm"><i class="fa-solid fa-plus"></i></button>
            </div>
    </div>

      <div class="row app p-0 m-0">
          <div class="col">
          <!-- Table -->
          <div class="table-responsive">
            <table class="table table-hover align-middle" id="tableIncome">
              <thead>
                <tr>
                    <th>Income No</th>
                    <th>Receipt</th>
                    <th>Invoice No</th>
                    <th>Payment Method</th>
                    <th>Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                </tr>
              </thead>
              <tbody id="tableIncomeBody"></tbody>
            </table>
          </div>
          </div>
      </div>
      <!-- Modal -->
      <div class="modal fade" id="modalIncomeForm" tabindex="-1" aria-labelledby="modalIncomeFormLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
          <div class="modal-content">
        
            <div class="modal-header">
              <h6 class="modal-title" id="modalIncomeFormLabel">Add New</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
        
            <div class="modal-body">
              <form id="formIncome" class="row g-3 col-xl-12 col-lg-12 col-md-12 mx-auto" onsubmit="return false">

                <div class="col-xl-12">
                <label class="form-label">Receipt<span class="text-danger">*</span></label>
                <div class="input-group d-flex align-items-center gap-4">
                  <div><img id="imgReceiptPhotoPreview" src="/images/default.png" alt="" class="rounded" width="90px" height="90px"></div>
                  <div>
                    <button onclick="fileReceiptPhoto.click()" type="button" class="btn btn-outline-primary">select receipt</button>
                    <button type="button" class="btn btn-outline-secondary">clear</button>
                    <input onchange="fileValidator(this, 'income', 'receiptimage', imgReceiptPhotoPreview)" type="file" class="d-none" id="fileReceiptPhoto">
                  </div>
                </div>
              </div>

                <div class="col-xl-4">
                  <label class="form-label">Invoice no<span class="text-danger">*</span></label>
                  <select id="selectInvoiceNo" Required  class="form-select" onchange="selectDynamicElementValidator(this,'income','invoice_id')"></select>
                </div>
                <div class="col-xl-4">
                  <label class="form-label">Payment Method<span class="text-danger">*</span></label>
                  <select id="selectPaymentMethord" class="form-select" Required  onchange="selectStaticElementValidator(this,'income','payment_methord')">
                    <option value="Select Civil Status" selected disabled>Select Method</option>
                    <option value="Cash">Cash</option> 
                    <option value="Card">Card</option>
                    <option value="Bank">Bank</option> 
                </select>
                </div>
                <div class="col-xl-4">
                  <label class="form-label">Date<span class="text-danger">*</span></label>
                  <input id="incomeDate" type="date" Required  class="form-control" onkeydown="return false" onchange="dateElemantValidator(this, 'income','date' )">
                </div>
                <div class="col-xl-4">
                  <label class="form-label">Total Amount<span class="text-danger">*</span></label>
                  <input id="textTotal" type="text" Required  class="form-control" onkeyup="textValidator(this,'^[0-9]+(\\.[0-9]{1,2})?$', 'income','total_amount')">
                </div>
                <div class="col-xl-4">
                  <label for="selectStatus" class="form-label">Status<span class="text-danger">*</span></label>
                  <select id="selectStatus" class="form-select" Required  onchange="selectDynamicElementValidator(this,'income','income_status_id')"></select>
                </div>
  
              </form>
            </div>
        
            <div class="modal-footer">
              <div class="col">
                <button type="button" onclick="buttonIncomeDelete(window['editOb'], window['editRowIndex'])" class="btn btn-outline-danger" id="buttonDelete">Delete</button>
                <button type="button" onclick="refreshIncomeForm()" class="btn btn-outline-danger" id="buttonClear">Clear</button>
              </div> 
              <div class="col text-end">
                <button type="button" onclick="buttonIncomePrint(window['editOb'], window['editRowIndex'])" class="btn btn-tertiry" id="buttonPrint">Print</button>    
                <button type="button" onclick="buttonIncomeUpdate()" class="btn btn-primary" id="buttonUpdate">Update</button>    
                <button type="button" onclick="buttonIncomeSubmit()" class="btn btn-primary" id="buttonSubmit">Submit</button>  
            </div>
            </div>
        
          </div>
        </div>
        </div>
  </div>
</div>




      <div th:replace="~{common :: scripts}"></div>
      <script src="/uicontroller/income.js"></script>
</body>
</html>
