<!DOCTYPE html>
<html lang="en">

<div th:replace="~{common :: headFragment}"></div>

<body>
  <!-- Cursor effect -->
  <div class="cursor"></div>

  <div class="container-fluid p-0 m-0">
    <!-- nav bar -->
    <nav class="navbar row py-0 mx-0">
      <div class="col-xl d-flex p-0 gap-1">
        <a href="/dashboard"><img src="/images/logo/logomark-md.svg" alt=""></a>
        <h4 class="my-auto" id="wordmark"><span style=" color: #059025;">Erea</span><Span
            style=" color: #97CC16;">Mart</Span></h4>
      </div>
      <div class="col-xl-6 d-flex p-0">
        <ul
          class="list-group nav nav-pills list-group-horizontal rounded-pill justify-content-center sidebarbody p-1 mx-auto horizontal_navbar"
          style="width: fit-content;">
          <li class="nav-item"><a class="nav-link rounded-pill" href="/dashboard">Home</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill active" href="/product">Store</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/expense">Wallet</i></a></li>
        </ul>

      </div>
      <div th:replace="~{common :: sellerprofiledropdown}"></div>

    </nav>

    <div class=" container-fluid row p-0 m-0">
      <div class="col"></div>
      <div class="col-xl-6 mt-1 p-0">
        <ul class="nav nav-pills rounded-pill justify-content-center p-1 mx-auto" style="width: fit-content;">
          <li class="nav-item"><a class="nav-link rounded-pill active" href="/product">Product</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/supplier">Supplier</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/quotation">Quotation</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/respond">Respond</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/orders">Order</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/grn">GRN</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/inventory">Inventory</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill" href="/customer">Customer</a></li>
          <li class="nav-item"><a class="nav-link rounded-pill " href="/invoice">Invoice</a></li>
        </ul>
      </div>
      <div class="col-xl d-flex justify-content-end gap-1 text-end my-auto p-0">
        <button type="button" class="btn btn-primary rounded-pill" onclick="buttonAddNew()" data-bs-toggle="modal"
          data-bs-target="#modalProductForm">Add New</button>
      </div>
    </div>

    <div class="row app p-0 m-0">
      <!-- Table -->
      <div class="col">
        <div class="table-responsive">
          <table class="table  table-hover align-middle" id="tableProduct">
            <thead>
              <tr>
                <th>Code</th>
                <th>Barcode</th>
                <th>Image</th>
                <th>Manufacture</th>
                <th>Brand</th>
                <th>Product</th>
                <th>Size</th>
                <th>Name</th>
                <th>ROP</th>
                <th>ROQ</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tableProductBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalProductForm" tabindex="-1" aria-labelledby="modalProductFormLabel"
      aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content">

          <div class="modal-header">
            <h6 class="modal-title" id="modalProductFormLabel">Add New</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <form id="formProduct" class="row g-3 col-xl-12 col-lg-12 col-md-12 mx-auto" onsubmit="return false">

              <div class="col-xl-12">
                <label class="form-label">Product photo<span class="text-danger">*</span></label>
                <div class="input-group d-flex align-items-center gap-4">
                  <div><img id="imgproductPhotoPreview" src="/images/default.png" alt="" class="rounded" width="90px"
                      height="90px"></div>
                  <div>
                    <button onclick="fileProductPhoto.click()" type="button" class="btn btn-outline-primary">select
                      photo</button>
                    <button type="button" class="btn btn-outline-secondary">clear</button>
                    <input onchange="fileValidator(this, 'product', 'image', imgproductPhotoPreview)" type="file"
                      class="d-none" id="fileProductPhoto">
                  </div>
                </div>
              </div>

              <div class="col-xl-6 col-lg-6">
                <label class="form-label">Manufacture<span class="text-danger">*</span></label>
                <div class="input-group">
                  <select id="textManufacture" Required class="form-select"
                    onchange="selectDynamicElementValidator(this,'product','productmanufacture_id'), filterBrandByManufacture();"></select>
                  <button class="btn btn-outline-secondary" type="button" data-bs-toggle="modal"
                    data-bs-target="#modalAddManufactureForm">Add New</button>
                </div>
              </div>

              <div class="col-xl-6 col-lg-6">
                <label class="form-label">Brand<span class="text-danger">*</span></label>
                <select id="textBrand" Required class="form-select"
                  onchange="selectDynamicElementValidator(this,'product','productbrand_id'), filterProductItemByBrand();"></select>
              </div>

              <div class="col-xl-6 col-lg-6">
                <label class="form-label">Product<span class="text-danger">*</span></label>
                <select id="selectProduct" Required class="form-select"
                  onchange="selectDynamicElementValidator(this,'product','productitem_id')"></select>
              </div>

              <div class="col-xl-6 col-lg-6">
                <label class="form-label">Size<span class="text-danger">*</span></label>
                <div class="input-group">
                  <input id="textSize" type="number" Required class="form-control"
                    onkeyup="textValidator(this,'^\\d*\\.?\\d+$', 'product','size')">
                  <select id="selectUnit" class="form-select" Required
                    onchange="selectStaticElementValidator(this,'product','unit')" aria-label="Select unit for size">
                    <option value="" selected disabled>Select Unit</option>
                    <option value="pcs">pcs</option>
                    <option value="g">g</option>
                    <option value="ml">ml</option>
                    <option value="cm">cm</option>
                  </select>
                </div>
              </div>
              <div class="col-lg-12">
                <label class="form-label">Product name<span class="text-danger">*</span></label>
                <input id="textProductName" type="text" Required class="form-control"
                  onkeyup="textValidator(this,'^[A-Za-z0-9\\s\\-\\.,()]{1,100}$', 'product','name')">
              </div>
              <div class="col-lg-12">
                <label class="form-label">Barcode</label>
                <input id="textBarcode" type="text" class="form-control"
                  onkeyup="textValidator(this,'^[A-Za-z0-9\\-]{1,100}$', 'product','barcode')">
              </div>
              <div class="col-xl-4 col-lg-6">
                <label class="form-label">ROP<span class="text-danger">*</span></label>
                <input id="textROP" type="text" Required class="form-control"
                  onkeyup="textValidator(this,'^[0-9]+$', 'product','rop')">
              </div>
              <div class="col-xl-4 col-lg-6">
                <label class="form-label">ROQ<span class="text-danger">*</span></label>
                <input id="textROQ" type="text" Required class="form-control"
                  onkeyup="textValidator(this,'^[0-9]+$', 'product','roq')">
              </div>
              <div class="col-xl-4 col-lg-6">
                <label class="form-label">Status<span class="text-danger">*</span></label>
                <select id="selectStatus" Required class="form-select"
                  onchange="selectDynamicElementValidator(this,'product','productstatus_id')"></select>
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <div class="col">
              <button type="button" onclick="buttonProductDelete(window['editOb'], window['editRowIndex'])"
                class="btn btn-outline-danger" id="buttonDelete">Delete</button>
              <button type="button" onclick="refreshProductForm()" class="btn btn-outline-danger"
                id="buttonClear">Clear</button>
            </div>
            <div class="col text-end">
              <button type="button" onclick="buttonProductPrint(window['editOb'], window['editRowIndex'])"
                class="btn btn-tertiry" id="buttonPrint">Print</button>
              <button type="button" onclick="buttonProductUpdate()" class="btn btn-primary"
                id="buttonUpdate">Update</button>
              <button type="button" onclick="buttonProductSubmit()" class="btn btn-primary"
                id="buttonSubmit">Submit</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Modal  add category-->
    <div class="modal fade" id="modalAddManufactureForm" tabindex="-1" aria-labelledby="modalAddManufactureFormLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-md">
        <div class="modal-content">

          <div class="modal-header">
            <h6 class="modal-title" id="modalAddManufactureFormLabel">Add New Manufacture</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" data-bs-toggle="modal"
              data-bs-target="#modalProductForm"></button>
          </div>

          <div class="modal-body">
            <form id="formAddCategory" class="row g-3 col-xl-12 col-lg-12 col-md-12 mx-auto" onsubmit="return false">
              <div class="col-xl-12 col-lg-12">
                <label class="form-label">Name<span class="text-danger">*</span></label>
                <input type="textManufacture" Required class="form-control"
                  onkeyup="textValidator(this,'^[A-Za-z0-9\\s\\-\\.,]{1,100}$', 'productmanufacture','name')">
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <div class="col">
              <button type="button" onclick="refreshProductManufactureForm()"
                class="btn btn-outline-danger">Clear</button>
            </div>
            <div class="col text-end">
              <button type="button" onclick="buttonProductManufactureSubmit()" class="btn btn-primary">Submit</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{common :: scripts}"></div>
  <script src="/uicontroller/product.js"></script>
</body>

</html>
