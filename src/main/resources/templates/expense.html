<!DOCTYPE html>
<html lang="en">
<div th:replace="~{common :: headFragment}"></div>
<body>
  <!-- Cursor effect -->
  <div class="cursor"></div>

  <div class="container-fluid p-0 m-0">
      <!-- nav bar -->
      <nav class="navbar row py-0 mx-0">
          <div class="col-xl d-flex p-0 gap-1">
              <a href="/dashboard.html"><img src="/images/logo/logomark-md.svg" alt=""></a>
              <h5 class="my-auto" th:text="'Hi '+ ${loggedusername} + '👋'"></h5>
          </div>
          <div class="col-xl-6 d-flex p-0">
          <ul class="nav nav-pills justify-content-center rounded-pill p-1 mx-auto" style="width: fit-content;">
              <li class="nav-item"><a class="nav-link rounded-pill active" aria-current="page" href="/expense.html">Expenses</a></li>
              <li class="nav-item"><a class="nav-link rounded-pill" href="/income.html">Income</a></li>
          </ul>
          </div>
          <div class="col-xl d-flex gap-1 text-end my-auto p-0">
              <input class="form-control rounded-pill" type="search" placeholder="Search" aria-label="Search">
              <button type="button" class="btn btn-icon btn-primary" onclick="buttonAddNew()" data-bs-toggle="modal" data-bs-target="#modalExpensesForm"><i class="fa-solid fa-plus"></i></button>
            </div>
      </nav>
      <div class="row app p-0 m-0">
          <!-- Sidebbar -->
        <div class="col-1 p-0 m-0 w-auto h-100 d-flex">
          <ul class="nav nav-pills verticle_navbar my-auto list-group sidebarbody p-1" style="width: fit-content;">
               
              <li class="nav-item"><a class="nav-link btn-icon " href="/dashboard.html"><i class="fa-solid fa-house"></i></a></li>
              <li class="nav-item"><a class="nav-link btn-icon" href="/quotation.html"><i class="fa-solid fa-store"></i></a></li>
              <li class="nav-item"><a class="nav-link btn-icon active" href="/expense.html"><i class="fa-solid fa-wallet"></i></a></li>
              <li class="nav-item"><a class="nav-link btn-icon " href="/supplier.html"><i class="fa-solid fa-users"></i></a></li>
               
          </ul>
        </div>
          <div class="col">
          <!-- Table -->
          <div class="table-responsive">
            <table class="table   table-hover" id="tableExpenses">
              <thead>
                <tr>
                    <th>Bill No</th>
                    <th>Receipt</th>
                    <th>Supplier</th>
                    <th>Payment Method</th>
                    <th>Date</th>
                    <th>Total Due Amount</th>
                    <th>Paid Amount</th>
                    <th>Balance Amount</th>
                </tr>
              </thead>
              <tbody id="tableExpensesBody"></tbody>
            </table>
          </div>
          </div>
      </div>
      <!-- Modal -->
    <div class="modal fade" id="modalExpensesForm" tabindex="-1" aria-labelledby="modalExpensesFormLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content">
      
          <div class="modal-header">
            <h6 class="modal-title" id="modalExpensesFormLabel">Add New</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
      
          <div class="modal-body">
            <form id="formExpenses" class="row g-3 col-xl-12 col-lg-12 col-md-12 mx-auto" onsubmit="return false">
              <div class="col-xl-4">
                <label class="form-label">Bill no<span class="text-danger">*</span></label>
                <input id="billNo" type="text" Required  class="form-control" onchange="selectStaticElementValidator(this,'expenses','billno')">
              </div>
              <div class="col-xl-4">
                <label class="form-label">Receipt<span class="text-danger">*</span></label>
                <input id="expensesReceipt" type="text" Required  class="form-control" onchange="selectStaticElementValidator(this,'expenses','expensesreceipt')">
              </div>
              <div class="col-xl-4">
                <label class="form-label">Supplier<span class="text-danger">*</span></label>
                <select id="selectSupplier" Required class="form-select" onchange="selectDynamicElementValidator(this,'expenses','supplier_id')"></select>
              </div> 
              <div class="col-xl-4">
                <label class="form-label">Payment Method<span class="text-danger">*</span></label>
                <select id="selectPaymentMethord" class="form-select" Required  onchange="selectStaticElementValidator(this,'expenses','paymentmethord')">
                  <option value="Select Civil Status" selected disabled>Select Method</option>
                  <option value="Cash">Cash</option> 
                  <option value="Card">Card</option>
                  <option value="Bank">Bank</option> 
              </select>
              </div>
              <div class="col-xl-4">
                <label class="form-label">Total Due Amount<span class="text-danger">*</span></label>
                <input id="textTotalDue" type="text" Required  class="form-control" onkeyup="textValidator(this,'^.*$', 'expenses','totaldueamount')">
              </div>
              <div class="col-xl-4">
                <label class="form-label">Paid Amount<span class="text-danger">*</span></label>
                <input id="textTotalPaid" type="text" Required  class="form-control" onkeyup="textValidator(this,'^.*$', 'expenses','paidamount')">
              </div>
              <div class="col-xl-4">
                <label class="form-label">Balance Amount<span class="text-danger">*</span></label>
                <input id="textTotalBalance" type="text" Required  class="form-control" onkeyup="textValidator(this,'^.*$', 'expenses','balanceamount')">
              </div>
              <div class="col-xl-4">
                <label class="form-label">Date<span class="text-danger">*</span></label>
                <input id="expensesDate" type="date" Required  class="form-control" onkeydown="return false" onchange="dateElemantValidator(this, 'expenses','date' )">
              </div>
            </form>
          </div>
      
          <div class="modal-footer">
            <div class="col">
              <button type="button" onclick="buttonExpensesDelete(window['editOb'], window['editRowIndex'])" class="btn btn-outline-danger" id="buttonDelete">Delete</button>
              <button type="button" onclick="refreshExpensesForm()" class="btn btn-outline-danger" id="buttonClear">Clear</button>
            </div> 
            <div class="col text-end">
              <button type="button" onclick="buttonExpensesPrint(window['editOb'], window['editRowIndex'])" class="btn btn-tertiry" id="buttonPrint">Print</button>    
              <button type="button" onclick="buttonExpensesUpdate()" class="btn btn-primary" id="buttonUpdate">Update</button>    
              <button type="button" onclick="buttonExpensesSubmit()" class="btn btn-primary" id="buttonSubmit">Submit</button>  
          </div>
          </div>
      
        </div>
      </div>
      </div>
      <!-- Bottombar -->
      <ul class="list-group nav nav-pills list-group-horizontal justify-content-center sidebarbody p-1 mx-auto horizontal_navbar" style="width: fit-content;">
         
        <li class="nav-item"><a class="nav-link btn-icon " href="/dashboard.html"><i class="fa-solid fa-house"></i></a></li>
        <li class="nav-item"><a class="nav-link btn-icon" href="/quotation.html"><i class="fa-solid fa-store"></i></a></li>
        <li class="nav-item"><a class="nav-link btn-icon active" href="/expense.html"><i class="fa-solid fa-wallet"></i></a></li>
        <li class="nav-item"><a class="nav-link btn-icon " href="/supplier.html"><i class="fa-solid fa-users"></i></a></li>
         
      </ul>
  </div>
</div>
    <div th:replace="~{common :: scripts}"></div>
    <script src="/uicontroller/expenses.js"></script>
</body>
</html>
